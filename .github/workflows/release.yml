name: Release

# Tag a version (e.g. `git tag v1.0.0 && git push --tags`) to build, sign,
# notarize, package a DMG, and publish a GitHub Release automatically.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MACOS_CERT_P12        base64 of your "Developer ID Application" .p12
#   MACOS_CERT_PASSWORD   password for that .p12
#   KEYCHAIN_PASSWORD     any throwaway password for the temp CI keychain
#   MACOS_DEVID           e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID              your Apple ID email (for notarytool)
#   APPLE_TEAM_ID         your 10-char Team ID
#   APPLE_APP_PASSWORD    an app-specific password from appleid.apple.com
#
# NOTE: the bundled ogma CoreML models are gitignored (.mlpackage files are large
# binaries produced locally). For CI to build a working app, the "Restore on-device
# models" step below downloads the public ogma PyTorch weights from HuggingFace and
# converts them to CoreML via tools/restore-models.sh — BEFORE Scripts/release.sh
# runs — so the released app keeps its on-device semantic-search feature instead of
# silently falling back to the weak HashingEmbedder.

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for CoreML conversion)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache the restored/converted models keyed on the conversion inputs, so we
      # only re-download from HuggingFace + re-convert when the tooling changes.
      - name: Cache on-device models
        uses: actions/cache@v4
        with:
          path: tools/models
          key: ogma-models-${{ hashFiles('tools/convert_ogma.py', 'tools/_dl.py', 'tools/restore-models.sh', 'tools/_compat.py', 'tools/requirements.txt') }}
          restore-keys: |
            ogma-models-

      - name: Restore on-device models
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: |
          python3 -m pip install --upgrade pip
          # Conversion stack centralized in tools/requirements.txt (also exercised
          # cert-free by .github/workflows/models.yml).
          python3 -m pip install -r tools/requirements.txt
          bash tools/restore-models.sh

      - name: Verify bundled models are present
        run: |
          if ! ls tools/models/*.mlpackage >/dev/null 2>&1; then
            echo "::error::No models in tools/models/*.mlpackage after restore. See tools/restore-models.sh."
            exit 1
          fi

      - name: Set up signing keychain
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f /tmp/cert.p12

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials yank-notary \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD"

      - name: Build, sign, notarize, package DMG
        env:
          DEVID: ${{ secrets.MACOS_DEVID }}
          NOTARY_PROFILE: yank-notary
        run: bash Scripts/release.sh

      - name: Compute DMG checksum
        id: dmg
        run: |
          FILE=$(ls build/Yank-*.dmg)
          echo "path=$FILE" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$FILE" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.path }}
          generate_release_notes: true
          body: |
            ### Yank ${{ github.ref_name }}
            A fast, private, open-source clipboard manager for macOS.

            - macOS 13 Ventura or later · Universal (Apple Silicon & Intel) · notarized
            - **SHA-256:** `${{ steps.dmg.outputs.sha256 }}`

            Install: download the DMG, drag Yank to Applications, and press ⌃⌥⌘V.
            Or via Homebrew once the cask is published: `brew install --cask yank`.
